appId: com.example.my_app
name: "05 · Student — Personal schedule (add & delete)"
---
- clearState
- launchApp
- waitForAnimationToEnd

- runFlow:
    file: ../subflows/_login_student.yaml
    env:
      OTP: "123456"

- waitForAnimationToEnd

# ── Navigate to Schedule tab ──────────────────────────────────────
- tapOn:
    id: "nav_schedule"

- assertVisible:
    id: "schedule_btn_toggle_delete"
- assertVisible:
    id: "schedule_fab_add"

# ── Open the add-subject sheet ────────────────────────────────────
- tapOn:
    id: "schedule_fab_add"

- waitForAnimationToEnd:
    timeout: 3000

# Verify all sheet identifiers are accessible
- assertVisible:
    id: "schedule_btn_save_all"
- assertVisible:
    id: "schedule_btn_add_another_subject"
- assertVisible:
    id: "schedule_field_subject_0"
- assertVisible:
    id: "schedule_chip_day_7"

# ── Dismiss sheet via Android back (avoids Arabic text-tap issues) ─
# tapOn: text: Arabic fails when button label changes from "حفظ الكل"
# to "حفظ الكل · N حصة" after chip selection. Back button is reliable.
- pressKey: back
- waitForAnimationToEnd:
    timeout: 3000

# ── Toggle delete mode on then off ───────────────────────────────
- tapOn:
    id: "schedule_btn_toggle_delete"
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: "schedule_btn_toggle_delete"
